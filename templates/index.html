<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Planning | Control Center</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <nav class="border-b border-gray-800 p-4 bg-gray-900 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">🏗️ ABM <span class="text-blue-500">Site Planning</span></h1>
            <div class="space-x-4">
                <span class="text-gray-400 text-sm">Target: Wood Wharf, London</span>
                <button onclick="runSimulation()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition">Run Simulation</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-lg font-semibold mb-4 text-blue-400">Site Configuration</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Agent Count</label>
                        <input id="n_workers" type="number" value="20" class="w-full bg-gray-700 border-none rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Width (m)</label>
                        <input id="width" type="number" value="300" class="w-full bg-gray-700 border-none rounded p-2 text-white">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-gray-400 mb-1">Height (m)</label>
                        <input id="height" type="number" value="200" class="w-full bg-gray-700 border-none rounded p-2 text-white">
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-lg font-semibold mb-2 text-green-400">Briefing Summary</h2>
                <p id="briefing" class="text-sm text-gray-400 italic">No simulation data yet. Run to generate intelligence.</p>
            </div>
        </div>

        <div class="lg:col-span-3 bg-gray-800 rounded-xl border border-gray-700 overflow-hidden relative">
            <div id="plot" class="w-full h-[600px]"></div>
            <div id="loading" class="hidden absolute inset-0 bg-gray-900/80 flex items-center justify-center">
                <p class="text-blue-400 animate-pulse font-bold">SIMULATING AGENTS...</p>
            </div>
        </div>

        <div class="mt-4">
    <label class="block text-sm font-medium text-gray-400">Strategy Mode</label>
    <div class="flex items-center mt-2 space-x-4">
        <button id="profit-btn" onclick="setMode('Profit')" 
            class="px-4 py-2 text-xs font-bold text-white bg-blue-600 rounded-lg border-2 border-blue-400">
            PROFIT (ALPHA)
        </button>
        <button id="resilience-btn" onclick="setMode('Resilience')" 
            class="px-4 py-2 text-xs font-bold text-gray-400 bg-gray-800 rounded-lg border-2 border-gray-700">
            RESILIENCE (ESG)
        </button>
    </div>
</div>

    </main>
<script>
    // Jinja2 will replace {{ mapbox_token }} with the actual string from your .env
    mapboxgl.accessToken = '{{ mapbox_token }}';
// 1. Initialize the Map centered on Wood Wharf
const map = new mapboxgl.Map({
    container: 'plot', // This matches your div ID
    style: 'mapbox://styles/mapbox/navigation-night-v1', 
    center: [-0.019, 51.502], // Wood Wharf Coordinates
    zoom: 16,
    pitch: 60, // 3D Tilt
    bearing: -20,
    antialias: true
});

// 2. Add 3D Buildings
map.on('style.load', () => {
    map.addLayer({
        'id': '3d-buildings',
        'source': 'composite',
        'source-layer': 'building',
        'filter': ['==', 'extrude', 'true'],
        'type': 'fill-extrusion',
        'minzoom': 15,
        'paint': {
            'fill-extrusion-color': '#334155',
            'fill-extrusion-height': ['get', 'height'],
            'fill-extrusion-base': ['get', 'min_height'],
            'fill-extrusion-opacity': 0.6
        }
    });
});
function setMode(newMode) {
    fetch('/update_mode', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mode: newMode })
    })
    .then(response => {
        const profitBtn = document.getElementById('profit-btn');
        const resilienceBtn = document.getElementById('resilience-btn');
        
        if (newMode === 'Profit') {
            // High-Alpha Blue
            profitBtn.className = "px-4 py-2 text-xs font-bold text-white bg-blue-600 rounded-lg border-2 border-blue-400 shadow-lg shadow-blue-500/20";
            resilienceBtn.className = "px-4 py-2 text-xs font-bold text-gray-400 bg-gray-800 rounded-lg border-2 border-gray-700";
        } else {
            // ESG Green
            resilienceBtn.className = "px-4 py-2 text-xs font-bold text-white bg-emerald-600 rounded-lg border-2 border-emerald-400 shadow-lg shadow-emerald-500/20";
            profitBtn.className = "px-4 py-2 text-xs font-bold text-gray-400 bg-gray-800 rounded-lg border-2 border-gray-700";
        }
        console.log(`Simulation Mode switched to: ${newMode}`);
    });
}

let simulationData = [];
let currentStep = 0;
let animationInterval;

async function runSimulation() {
    const n = document.getElementById('n_workers').value;
    const w = document.getElementById('width').value;
    const h = document.getElementById('height').value;
    const loader = document.getElementById('loading');
    
    loader.classList.remove('hidden');

    try {
        // Fix: Explicitly use URLSearchParams to ensure FastAPI reads them correctly
        const params = new URLSearchParams({ n_workers: n, width: w, height: h });
        const res = await fetch(`/run-simulation/?${params.toString()}`, { 
            method: 'POST',
            headers: { 'Accept': 'application/json' }
        });
        
        const simData = await res.json();
        
        // Wait 500ms to ensure Postgres has finished the bulk commit
        await new Promise(r => setTimeout(r, 500));

        const resData = await fetch(`/simulation-results/${simData.run_id}`);
        const results = await resData.json();

        if (results.error) throw new Error(results.error);

        simulationData = results.data;
        currentStep = 0;

        if (animationInterval) clearInterval(animationInterval);
        animationInterval = setInterval(renderAnimationFrame, 80); // Slightly faster for smoother motion

    } catch (err) {
        console.error("Visualizer Error:", err);
        document.getElementById('briefing').innerHTML = `<span class="text-red-400">Error:</span> ${err.message}`;
    } finally {
        loader.classList.add('hidden');
    }
}

function renderAnimationFrame() {
    const frameData = simulationData.filter(p => p.step === currentStep);
    
    // Check if we hit the end of the simulation
    if (frameData.length === 0) {
        clearInterval(animationInterval);
        document.getElementById('briefing').innerHTML = 
            `<span class="text-green-400">Analysis Complete:</span> Generating Footfall Heatmap...`;
        
        // 🔥 NOW trigger the final heatmap using ALL data points
        showHeatmap(simulationData); 
        return;
    }

    // 1. Prepare GeoJSON for the CURRENT step only (for the moving dots)
    const geojson = {
        'type': 'FeatureCollection',
        'features': frameData.map(p => ({
            'type': 'Feature',
            'geometry': {
                'type': 'Point',
                'coordinates': [-0.0192 + (p.x / 111320), 51.5015 + (p.y / 111320)]
            }
        }))
    };

    // 2. Update the "Moving Dots" Layer
    if (map.getSource('agents')) {
        map.getSource('agents').setData(geojson);
    } else {
        map.addSource('agents', { type: 'geojson', data: geojson });
        map.addLayer({
            id: 'agent-layer',
            type: 'circle',
            source: 'agents',
            paint: {
                'circle-radius': 5,
                'circle-color': '#3b82f6',
                'circle-stroke-width': 2,
                'circle-stroke-color': '#ffffff'
            }
        });
    }

    document.getElementById('briefing').innerHTML = `Visualizing Step: ${currentStep} / 50`;
    currentStep++;
}

// Separate function for the static Heatmap
function showHeatmap(allPoints) {
    const geojson = {
        'type': 'FeatureCollection',
        'features': allPoints.map(p => ({
            'type': 'Feature',
            'geometry': {
                'type': 'Point',
                'coordinates': [-0.0192 + (p.x / 111320), 51.5015 + (p.y / 111320)]
            }
        }))
    };

    // Remove the moving dots layer so we can see the heatmap clearly
    if (map.getLayer('agent-layer')) map.removeLayer('agent-layer');

    if (map.getSource('heatmap-data')) {
        map.getSource('heatmap-data').setData(geojson);
    } else {
        map.addSource('heatmap-data', { type: 'geojson', data: geojson });
        map.addLayer({
            id: 'agent-heat',
            type: 'heatmap',
            source: 'heatmap-data',
            paint: {
                'heatmap-intensity': 1,
                'heatmap-color': [
                    'interpolate', ['linear'], ['heatmap-density'],
                    0, 'rgba(0, 0, 255, 0)',
                    0.2, 'rgb(0, 255, 255)',
                    0.4, 'rgb(0, 255, 0)',
                    0.6, 'rgb(255, 255, 0)',
                    1, 'rgb(255, 0, 0)'
                ],
                'heatmap-radius': 20,
                'heatmap-opacity': 0.8
            }
        });
    }
    
}
</script>
</body>
</html>
